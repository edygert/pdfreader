<!DOCTYPE html>
<!--
  Landing page for the apps host (apps.dygertconsulting.com).
  Lives at the S3 bucket root; each app is served from its own /<name>/ prefix.
  Deploy:  aws s3 cp apps-root/index.html s3://<bucket>/index.html \
             --content-type text/html --cache-control no-cache
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1e1e" />
    <title>Dygert Consulting · Apps</title>
    <style>
      :root { --bg:#1e1e1e; --fg:#dddddd; --dim:#999; --card:#2b2b2b; --line:#444; --accent:#7fd1ff; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg); color: var(--fg);
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 100vh; padding: 24px;
      }
      main { width: 100%; max-width: 640px; }
      h1 { font-size: clamp(24px, 5vw, 34px); margin: 0 0 4px; }
      .sub { color: var(--dim); margin: 0 0 28px; font-size: 15px; }
      ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
      a.app {
        display: flex; align-items: center; gap: 14px;
        padding: 18px 20px; text-decoration: none; color: var(--fg);
        background: var(--card); border: 1px solid var(--line); border-radius: 14px;
        transition: border-color .15s ease, transform .05s ease;
      }
      a.app:hover { border-color: var(--accent); }
      a.app:active { transform: scale(0.995); }
      .ico { font-size: 30px; line-height: 1; }
      .meta { display: flex; flex-direction: column; }
      .name { font-size: 18px; font-weight: 600; }
      .desc { color: var(--dim); font-size: 14px; }
      .arrow { margin-left: auto; color: var(--accent); font-size: 22px; }
      footer { color: var(--dim); font-size: 13px; margin-top: 28px; text-align: center; }
    </style>
  </head>
  <body>
    <main>
      <h1>Apps</h1>
      <p class="sub">dygertconsulting.com</p>
      <ul>
        <li>
          <a class="app" href="/pdfreader/">
            <span class="ico">📄</span>
            <span class="meta">
              <span class="name">pdfreader</span>
              <span class="desc">Fast, minimal PDF reader — keyboard &amp; touch</span>
            </span>
            <span class="arrow">→</span>
          </a>
        </li>
      </ul>
      <footer>© Dygert Consulting</footer>
    </main>
  </body>
</html>
