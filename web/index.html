<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1e1e" />
    <title>pdfreader</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="viewport">
      <div id="page-wrap">
        <canvas id="page"></canvas>
        <div id="text-layer" class="textLayer"></div>
      </div>
      <div id="hint">
        Tap <b>Open</b> below, press <kbd>o</kbd>, or drag a PDF here
        &nbsp;·&nbsp; tap <b>?</b> or press <kbd>?</kbd> for help
      </div>
      <div id="notice">⚠ This page has no copyable text — the PDF has no Unicode font mapping</div>
    </main>

    <!-- Touch toolbar: every button calls the same function as its keyboard
         shortcut, so a keyboard is never required (e.g. on iPad). Auto-hides
         while reading; a center tap toggles it. -->
    <nav id="toolbar" aria-label="Toolbar">
      <button data-act="open" type="button" aria-label="Open file" title="Open file (o)">📂</button>
      <button data-act="recent" type="button" aria-label="Recent files" title="Recent files (Shift+O)">🕘</button>
      <span class="tb-sep"></span>
      <button data-act="prev" type="button" aria-label="Previous page" title="Previous page">◀</button>
      <button id="tb-page" data-act="goto" type="button" aria-label="Go to page" title="Go to page (:)">– / –</button>
      <button data-act="next" type="button" aria-label="Next page" title="Next page">▶</button>
      <span class="tb-sep"></span>
      <button data-act="zoomout" type="button" aria-label="Zoom out" title="Zoom out (-)">−</button>
      <button data-act="zoomin" type="button" aria-label="Zoom in" title="Zoom in (+)">+</button>
      <button data-act="fitwidth" type="button" aria-label="Fit width" title="Fit width (Shift+W)">↔</button>
      <span class="tb-sep"></span>
      <button data-act="more" type="button" aria-label="More" title="More" aria-expanded="false">⋯</button>
      <div id="tb-more" role="menu" aria-label="More actions">
        <button data-act="fitheight" type="button" role="menuitem">Fit height</button>
        <button data-act="rotate" type="button" role="menuitem">Rotate</button>
        <button data-act="toc" type="button" role="menuitem">Contents</button>
        <button data-act="theme" type="button" role="menuitem">Page color</button>
        <button data-act="help" type="button" role="menuitem">Help</button>
      </div>
    </nav>

    <button id="install" type="button">⬇ Install app</button>
    <div id="status"></div>
    <div id="help" role="dialog" aria-label="Keyboard shortcuts"></div>
    <div id="toc" role="dialog" aria-label="Table of contents"></div>
    <div id="recent" role="dialog" aria-label="Recent files"></div>

    <input id="file-input" type="file" accept="application/pdf,.pdf" hidden />

    <script type="module" src="./app.js"></script>
  </body>
</html>
