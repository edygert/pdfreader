<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1e1e" />
    <title>pdfreader</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="viewport">
      <canvas id="page"></canvas>
      <div id="hint">
        Press <kbd>o</kbd> to open a PDF &nbsp;·&nbsp; or drag one here
        &nbsp;·&nbsp; <kbd>?</kbd> for help
      </div>
    </main>

    <button id="resume" type="button"></button>
    <button id="install" type="button">⬇ Install app</button>
    <div id="status"></div>
    <div id="help" role="dialog" aria-label="Keyboard shortcuts"></div>

    <input id="file-input" type="file" accept="application/pdf,.pdf" hidden />

    <script type="module" src="./app.js"></script>
  </body>
</html>
